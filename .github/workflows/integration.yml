name: Integration

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Root-required suite (PHP 8.3, Docker)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: hyperized-file-test:8.3
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite
        run: docker compose run --rm test sh -lc 'composer install --no-interaction --no-progress && vendor/bin/pest --testsuite=integration --colors=never'
