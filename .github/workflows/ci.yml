name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: posix
          coverage: pcov
          tools: composer:v2
          ini-values: error_reporting=E_ALL

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPStan
        run: composer phpstan

      - name: Pest (default suite)
        run: composer pest

      - name: Pest coverage report
        if: matrix.php == '8.3'
        run: vendor/bin/pest --coverage --coverage-clover=clover.xml --colors=never

      - name: Upload coverage artifact
        if: matrix.php == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: clover.xml
          if-no-files-found: error

  composer-normalize:
    name: composer normalize (dry-run)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: posix
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Verify composer.json is normalized
        run: composer normalize --dry-run
